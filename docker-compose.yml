# ─────────────────────────────────────────────────────────────────────
# PySpark ↔ BigQuery SQL (DuckDB) ローカル検証環境
#
# 起動:
#   docker compose up -d
#
# Spark Master UI: http://localhost:8080
# Spark App UI:    http://localhost:4040  (ジョブ実行中のみ)
# Jupyter:         http://localhost:8888  (token: dev)
# ─────────────────────────────────────────────────────────────────────

services:

  # ── Spark Master ────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "4040:4040"   # Spark UI
      - "7077:7077"   # Spark Master
      - "8080:8080"   # Spark Master Web UI
    volumes:
      - ./:/app
      - ./fixtures:/fixtures
      - spark-data:/tmp/spark-data
    networks:
      - spark-net
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host 0.0.0.0

  # ── Spark Worker ────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./:/app
      - ./fixtures:/fixtures
      - spark-data:/tmp/spark-data
    networks:
      - spark-net
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

  # ── Jupyter (PySpark + DuckDB を同じカーネルで使える) ──────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=dev
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
    ports:
      - "8888:8888"
    volumes:
      - ./:/home/jovyan/work
      - ./fixtures:/home/jovyan/fixtures
      - ./fixtures:/fixtures
    depends_on:
      - spark-master
    networks:
      - spark-net
    command: >
      bash -c "pip install duckdb pandas pyarrow --quiet &&
               start-notebook.sh --NotebookApp.token='dev'"

volumes:
  spark-data:

networks:
  spark-net:
    driver: bridge
